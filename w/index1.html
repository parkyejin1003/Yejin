<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.wrapper {
  position: relative;
  width: fit-content;
  display: inline-block;
}

.text-img {
  width: 400px;
}

.mask {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  animation: wipe 2s ease-in-out forwards;
}

@keyframes wipe {
  to {
    width: 0%;
  }
}

	</style>
</head>
<body>
	<div class="wrapper">
	<img src="./../박예진.svg" alt="박예진" class="text-img" />
	<div class="mask"></div>
</div>
</body>
</html>
